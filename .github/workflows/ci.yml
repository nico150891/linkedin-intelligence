name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check linkedin_intelligence/ tests/
      - name: Ruff format check
        run: ruff format --check linkedin_intelligence/ tests/
      - name: Mypy strict
        run: mypy --strict linkedin_intelligence/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev,test]"
      - name: Run unit tests
        run: pytest tests/unit/ --cov=linkedin_intelligence --cov-fail-under=80
