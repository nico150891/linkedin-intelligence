repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        args: [--strict]
        files: ^linkedin_intelligence/
        additional_dependencies:
          - pydantic>=2.5
          - pydantic-settings>=2.1
          - types-requests
          - pandas-stubs>=2.1
